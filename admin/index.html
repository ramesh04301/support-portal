<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Portal Admin</title>
  <!-- Stable working version of Sveltia CMS (March 2026) -->
  <script src="https://unpkg.com/@sveltia/cms@0.150.0/dist/sveltia-cms.js"></script>
</head>
<body>
  <script>
    // Small delay to ensure script loads
    setTimeout(() => {
      if (window.SveltiaCMS && typeof window.SveltiaCMS.init === 'function') {
        window.SveltiaCMS.init();
      } else {
        document.body.innerHTML = `
          <div style="padding: 50px; text-align: center; font-family: system-ui; max-width: 600px; margin: 100px auto;">
            <h2 style="color: #ef4444; font-size: 24px;">Sveltia CMS failed to load</h2>
            <p style="margin: 20px 0;">Please refresh the page (Ctrl + R) or try again in a new tab.</p>
            <p style="color: #666; font-size: 14px;">If the problem continues, reply with a screenshot of the Console tab.</p>
          </div>`;
      }
    }, 1000);
  </script>
</body>
</html>
